name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci --no-audit --no-fund
      - run: npm run lint
      - run: npm run format:check
      - name: Lint frontend
        working-directory: web-frontend
        run: |
          npm ci --no-audit --no-fund
          npm run lint
          npm run format:check

  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci --no-audit --no-fund
      - run: npm run typecheck
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci --no-audit --no-fund
      - run: npm test
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci --no-audit --no-fund
      - run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Build frontend
        working-directory: web-frontend
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            dist/
            web-frontend/dist/
          retention-days: 3
