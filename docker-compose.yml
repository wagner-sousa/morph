services:
  morph:
    build:
      context: .
      dockerfile: Dockerfile
    image: morph:2.0.0
    ports:
      - "${MORPH_WEB_PORT:-3101}:3100"
    # Single persisted folder: db, logs and (optionally) config live here.
    volumes:
      - ./data:/app/data
    user: "${UID:-1000}:${GID:-1000}"
    env_file:
      - ./.env
    environment:
      - NODE_ENV=production
      - MORPH_DATA_DIR=/app/data
      - MORPH_TRANSPORT=http
      # All settings below are optional — they override values in morph.json.
      # Config files are read from /app/data (or ./morph.json fallback). Set
      # MORPH_CONFIG / MORPH_MCP_CONFIG only to point at explicit paths.
      # - MORPH_CONFIG=/app/data/morph.json
      # - MORPH_MCP_CONFIG=/app/data/.mcp.json
      # - MORPH_LOG_LEVEL=info
      # - MORPH_LOG_FILE=true            # also write /app/data/logs/morph.log
      # - MORPH_WEB_ENABLED=true
      # - MORPH_WEB_HOST=0.0.0.0
      # - MORPH_WEB_PORT=3100
      # - MORPH_WEB_PUBLIC_URL=http://localhost:3101
      # - MORPH_ALLOW_CONFLICTS=false
      # - MORPH_TOOL_PREFIX=
      # - MORPH_TOON_AUTO_CONVERT=true
      # - MORPH_TOON_DELIMITER=comma
      # - MORPH_TOON_INDENT=2
      # - MORPH_TOON_FLATTEN_DEPTH=4
      # - MORPH_TOON_THRESHOLD=100
      # - MORPH_HEALTH_INTERVAL_MS=30000
      # - MORPH_HEALTH_TIMEOUT_MS=5000
      # - MORPH_HEALTH_MAX_RETRIES=3
      # - MORPH_WEB_USERNAME=admin       # enables Basic Auth on the Web UI
      # - MORPH_WEB_PASSWORD=change-me
    restart: unless-stopped
    stop_grace_period: 10s
