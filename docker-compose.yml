services:
  morph:
    build:
      context: .
      dockerfile: Dockerfile
    image: morph:2.0.0
    ports:
      - "3101:3100"
    volumes:
      - ./morph.json:/app/morph.json:ro
      - ./data:/app/data
    env_file:
      - ./.env
    environment:
      - NODE_ENV=production
      - MORPH_CONFIG=/app/morph.json
      - MORPH_DATA_DIR=/app/data
      - MORPH_TRANSPORT=http
    restart: unless-stopped
    stop_grace_period: 10s
