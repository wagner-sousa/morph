services:
  morph:
    image: node:22-bookworm
    working_dir: /app
    ports:
      - "3101:3101"
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
    command: >
      sh -c "npm install --no-audit --no-fund && npm run dev -- --config /app/morph.json"
    environment:
      - NODE_ENV=development
      - MORPH_CONFIG=/app/morph.json
      - MORPH_DATA_DIR=/app/data
      - MORPH_TRANSPORT=http
      - CHOKIDAR_USEPOLLING=true

  morph-studio:
    image: node:22-bookworm-slim
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./web-frontend:/app
      - studio_node_modules:/app/node_modules
    command: >
      sh -c "npm install --no-audit --no-fund && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      - VITE_API_URL=http://morph:3101
    depends_on:
      - morph

  mcp-test-servers:
    image: node:22-bookworm
    working_dir: /app
    ports:
      - "3200:3200"
      - "3201:3201"
      - "3202:3202"
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
    command: >
      sh -c "npx tsx src/examples/http-mcp-server.ts & npx tsx src/examples/sse-mcp-server.ts & npx tsx src/examples/oauth-mcp-server.ts & wait"
    environment:
      - HTTP_MCP_PORT=3200
      - SSE_MCP_PORT=3201
      - OAUTH_MCP_PORT=3202

volumes:
  node_modules:
  studio_node_modules:
