services:
  morph:
    image: node:22-bookworm
    working_dir: /app
    ports:
      - "3100:3100"
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
    command: >
      sh -c "npm install --no-audit --no-fund && npm run dev -- --config /app/morph.json"
    environment:
      - NODE_ENV=development
      - MORPH_CONFIG=/app/morph.json
      - MORPH_DATA_DIR=/app/data
      - MORPH_TRANSPORT=http
      - CHOKIDAR_USEPOLLING=true

  morph-studio:
    image: node:22-bookworm-slim
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./web-frontend:/app
      - studio_node_modules:/app/node_modules
    command: >
      sh -c "npm install --no-audit --no-fund && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      - VITE_API_URL=http://morph:3100
    depends_on:
      - morph

volumes:
  node_modules:
  studio_node_modules:
